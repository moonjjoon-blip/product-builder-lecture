<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Lotto Number Generator</h1>
            <button id="theme-toggle" type="button" aria-label="Toggle color theme">Dark Mode</button>
        </div>
        <div class="generator">
            <button id="generate">Generate Numbers</button>
            <div id="numbers" class="numbers"></div>
        </div>
        <div class="history">
            <h2>History</h2>
            <ul id="history-list"></ul>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
