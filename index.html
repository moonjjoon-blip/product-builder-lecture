<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 저녁 뭐 먹지?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-lang="ko">
    <div class="ambient ambient-left"></div>
    <div class="ambient ambient-right"></div>
    <main class="container">
        <section class="hero">
            <div class="hero-copy">
                <p class="eyebrow">Dinner Picker</p>
                <h1>오늘 저녁,<br>고민 말고 바로 고르기</h1>
                <p class="description">
                    한식, 면요리, 든든한 한 끼까지 분위기에 맞춰 추천합니다.
                    버튼 한 번으로 메뉴와 추천 이유를 바로 확인하세요.
                </p>
            </div>
            <div class="hero-actions">
                <nav class="locale-switch" aria-label="언어 선택">
                    <a class="locale-link active" href="./index.html">KR</a>
                    <a class="locale-link" href="./en.html">EN</a>
                </nav>
                <button id="theme-toggle" type="button" aria-label="색상 테마 전환">Night Mode</button>
            </div>
        </section>

        <section class="panel controls">
            <div class="chip-group" aria-label="추천 카테고리 선택">
                <button class="chip active" type="button" data-category="all">전체</button>
                <button class="chip" type="button" data-category="korean">한식</button>
                <button class="chip" type="button" data-category="asian">아시안</button>
                <button class="chip" type="button" data-category="western">양식</button>
                <button class="chip" type="button" data-category="quick">간단하게</button>
            </div>
            <button id="recommend" class="primary-button" type="button">저녁 메뉴 추천받기</button>
        </section>

        <section class="panel result-card" aria-live="polite">
            <p class="result-label">오늘의 추천</p>
            <h2 id="menu-name">아직 메뉴를 고르지 않았어요.</h2>
            <p id="menu-description" class="menu-description">
                버튼을 누르면 지금 기분에 어울리는 저녁 메뉴를 골라드립니다.
            </p>
            <div id="menu-tags" class="tags"></div>
        </section>

        <section class="panel history">
            <div class="history-header">
                <h3>최근 추천 기록</h3>
                <p>방금 본 메뉴를 다시 확인할 수 있습니다.</p>
            </div>
            <ul id="history-list"></ul>
        </section>

        <section class="panel inquiry">
            <div class="section-copy">
                <p class="section-label">Partnership</p>
                <h3>제휴 문의</h3>
                <p class="section-description">
                    협업, 광고, 공동 프로모션 제안을 남겨주시면 확인 후 연락드리겠습니다.
                </p>
            </div>
            <form class="inquiry-form" data-formspree-form>
                <label class="field">
                    <span>회사 또는 이름</span>
                    <input type="text" name="name" placeholder="예: Product Builder" required>
                </label>
                <label class="field">
                    <span>이메일</span>
                    <input type="email" name="email" placeholder="contact@example.com" required>
                </label>
                <label class="field">
                    <span>문의 내용</span>
                    <textarea name="message" rows="5" placeholder="제휴 목적과 간단한 제안 내용을 적어주세요." required></textarea>
                </label>
                <input type="hidden" name="_subject" value="제휴 문의가 도착했습니다">
                <button class="primary-button" type="submit">제휴 문의 보내기</button>
                <p class="form-status" data-form-status aria-live="polite"></p>
            </form>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
